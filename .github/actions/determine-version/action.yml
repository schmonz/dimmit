name: Determine version
description: Compute the release version from the triggering ref (a tag) or a dev placeholder.

outputs:
  version:
    description: The resolved version string.
    value: ${{ steps.ver.outputs.version }}

runs:
  using: composite
  steps:
    - id: ver
      shell: bash
      run: |
        if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        else
          echo "version=0.0.0-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
        fi
