name: Build and test (macOS)
description: Build the macOS universal binary, test the arm64 slice, and guard the 10.9 compat shims.

inputs:
  msc-ref:
    description: >-
      mavericks-shared-cmake commit to pin. Its compat_guard.sh backs the
      build-time mavericks_compat_guard(dimmitd) POST_BUILD in the x86_64
      sub-build (see CMakeLists.txt). Pinned by SHA for reproducible builds,
      the same convention as the other mavericks-* consumers.
    default: 312389eb8b3ac24c8f89fad2a78c82bc4eeac8cd  # mavericks-shared-cmake

runs:
  using: composite
  steps:
    # Install the shared 10.9 compat-guard machinery, pinned. It self-registers in
    # the user package registry, so the x86_64 sub-build's find_package(MavericksSharedCMake)
    # resolves it with no CMAKE_PREFIX_PATH. dimmit uses it à-la-carte (include(MavericksCompatGuard)
    # only) -- it does NOT fetch a 10.9 SDK (modern SDK + -mmacosx-version-min=10.9 + our shims).
    - name: Install mavericks-shared-cmake (pinned)
      shell: bash
      run: |
        git clone https://github.com/ModernMavericks/shared-cmake /tmp/msc
        git -C /tmp/msc checkout --quiet "${{ inputs.msc-ref }}"
        cmake -S /tmp/msc -B /tmp/msc/build
        cmake --install /tmp/msc/build --prefix "$HOME/.local"

    # The top-level build is the macOS universal wrapper: it probes the
    # toolchain, builds the arm64 (12.0) and x86_64 (10.9) slices, and lipos
    # them into build/universal/. Same path users build locally -- DRY. The x86_64
    # sub-build runs mavericks_compat_guard(dimmitd) as a POST_BUILD, so a post-10.9
    # symbol leak (or a missing shim) FAILS this build step -- no separate guard step.
    - name: Build universal binaries
      shell: bash
      run: |
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build
        lipo -info build/universal/dimmitd

    # Tests live in the per-arch sub-build trees, not the top-level universal
    # dir (CMakeLists.txt's universal branch returns() before enable_testing()
    # is ever reached). The arm64 slice runs natively on the runner; the
    # x86_64/10.9 slice is guard-only below since it's not natively runnable
    # here.
    - name: Test (arm64 slice)
      shell: bash
      run: ctest --test-dir build/build-arm64 --output-on-failure
