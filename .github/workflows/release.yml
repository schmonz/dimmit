name: release

# Build the macOS universal .pkg and publish it to GitHub Releases.
#
# Phase 1: unsigned. Signing/notarization is a later, bolt-on step (see the
# deferred-phases backlog).
#
# The spike confirmed a modern-SDK x86_64 slice targeting 10.9 runs on real
# Mavericks once the post-10.9 symbol leaks are shimmed (clock_gettime,
# IORegistryEntryCopyPath). The "10.9 compat guard" step below fails the build
# if a future change reintroduces such a leak.
#
# RELEASE INVARIANT: a release must contain EVERY artifact we ship -- never a
# partial one. The build jobs only upload workflow artifacts; the single
# `publish` job is the only thing that writes to GitHub Releases, and it
# `needs` every build job, so any build failure skips publishing entirely.
# When you add a new artifact-producing job, you MUST add it to `publish`'s
# `needs:` list -- there is no "depend on all jobs" in Actions, so a forgotten
# entry silently lets a release ship without that artifact.

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # manual runs produce an artifact, not a release

# Creating the Release and uploading assets needs the GITHUB_TOKEN to have
# write access to repo contents; the default is read-only, which 403s.
permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-26       # Tahoe (SDK 26.x) -- matches the toolchain we
                            # verified GREEN on real 10.9; builds both slices
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive   # vendored ddcctl + m1ddc are git submodules

      - name: Determine version
        id: ver
        uses: ./.github/actions/determine-version

      # The top-level build is the macOS universal wrapper: it probes the
      # toolchain, builds the arm64 (12.0) and x86_64 (10.9) slices, and lipos
      # them into build/universal/. Same path users build locally -- DRY.
      - name: Build universal binaries
        run: |
          cmake -S . -B build
          cmake --build build
          lipo -info build/universal/dimmitd

      - name: 10.9 compat guard (no post-10.9 symbol leaks)
        run: |
          slice=build/build-x86_64/dimmitd
          fail=0
          # Our deployment-target shims must be present...
          for sym in _dimmit_clock_gettime _dimmit_IORegistryEntryCopyPath; do
            if ! nm "$slice" | grep -q "T $sym\$"; then
              echo "::error::expected shim symbol $sym not defined in $slice"; fail=1
            fi
          done
          # ...and the system symbols they replace must NOT appear as
          # (non-weak) undefined references, or dyld aborts at launch on 10.9.
          leaked=$(nm "$slice" | grep -E ' U _(clock_gettime|IORegistryEntryCopyPath)$' || true)
          if [ -n "$leaked" ]; then
            echo "::error::post-10.9 symbol leaked into the x86_64 slice:"; echo "$leaked"; fail=1
          fi
          exit $fail

      - name: Build .pkg
        run: |
          sh packaging/macos/build_pkg.sh build/universal "${{ steps.ver.outputs.version }}" \
            "dimmit-${{ steps.ver.outputs.version }}.pkg"
          pkgutil --payload-files "dimmit-${{ steps.ver.outputs.version }}.pkg" | grep -E 'sbin|/bin/|LaunchAgents'

      - name: Emit machine-readable feed
        run: |
          VER="${{ steps.ver.outputs.version }}"
          cat > latest.json <<EOF
          {
            "version": "$VER",
            "min_os": "10.9",
            "pkg": "dimmit-$VER.pkg",
            "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/dimmit-$VER.pkg"
          }
          EOF
          cat latest.json

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v7
        with:
          name: dimmit-pkg
          path: |
            dimmit-*.pkg
            latest.json

  # Basic Linux .deb on plain ubuntu-latest -- a smoke test of the build+publish
  # path. The full design (per-distro container matrix + apt repo on the VPS) is
  # in docs/superpowers/plans/2026-06-11-linux-deb-distribution.md; this job
  # evolves into that. build_deb.sh ships the apt source only once the signing
  # key is committed, so for now this produces a plain .deb.
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Determine version
        id: ver
        uses: ./.github/actions/determine-version

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake pkg-config libddcutil-dev dpkg-dev build-essential

      - name: Build
        run: |
          cmake -B build-deb -DCMAKE_BUILD_TYPE=Release
          cmake --build build-deb

      - name: Build .deb
        run: |
          VER="${{ steps.ver.outputs.version }}"
          sh packaging/linux/build_deb.sh build-deb "$VER" noble "dimmit_${VER}_amd64.deb"

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v7
        with:
          name: dimmit-deb
          path: dimmit_*_amd64.deb

  # Native Windows PE builds via MSYS2/MinGW-w64. Two arches:
  #   x86_64 -> UCRT64 (gcc), arm64 -> CLANGARM64 (clang; no gcc for Win/ARM64).
  # Linked `-static` so the shipped .exe depends ONLY on OS-provided DLLs
  # (dxva2, kernel32, user32, ws2_32, UCRT) -- no libwinpthread/libgcc, so it
  # runs on a stock Windows 10 1803+/11 with no MSYS2 install. The DLL-leak
  # guard below fails the build if a future change reintroduces such a dep --
  # same spirit as the macOS 10.9 compat guard above. arm64 has no x86_64 host
  # that can run it; the windows-11-arm runner is its first real validation.
  release-windows:
    name: Build (Windows ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: windows-latest
            msystem: UCRT64
            prefix: mingw-w64-ucrt-x86_64
            cc: gcc
          - arch: arm64
            runner: windows-11-arm
            msystem: CLANGARM64
            prefix: mingw-w64-clang-aarch64
            cc: clang
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            git
            ${{ matrix.prefix }}-${{ matrix.cc }}
            ${{ matrix.prefix }}-cmake
            ${{ matrix.prefix }}-ninja
            ${{ matrix.prefix }}-pkgconf

      - name: Determine version
        id: ver
        uses: ./.github/actions/determine-version

      - name: Build (static, self-contained PE)
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_EXE_LINKER_FLAGS="-static"
          cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Guard -- only OS-provided DLL imports
        run: |
          OBJDUMP="$(command -v objdump || command -v llvm-objdump || true)"
          if [ -z "$OBJDUMP" ]; then echo "no objdump; skipping guard"; exit 0; fi
          for exe in build/dimmitd.exe build/dimmit-up.exe build/dimmit-down.exe; do
            deps="$("$OBJDUMP" -p "$exe" || true)"
            echo "== $exe =="; echo "$deps" | grep -i 'DLL Name' || true
            if echo "$deps" | grep -Eqi 'libwinpthread|libgcc_s|libstdc\+\+|libc\+\+|libunwind'; then
              echo "::error::non-system runtime DLL linked into $exe"; exit 1
            fi
          done

      - name: Package zip
        run: |
          VER="${{ steps.ver.outputs.version }}"
          dist="dimmit-$VER-windows-${{ matrix.arch }}"
          mkdir "$dist"
          cp build/dimmitd.exe build/dimmit-up.exe build/dimmit-down.exe "$dist"/
          cp docs/windows-build.md README.md "$dist"/
          cmake -E tar cf "$dist.zip" --format=zip "$dist"

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v7
        with:
          name: dimmit-windows-${{ matrix.arch }}
          path: dimmit-*-windows-*.zip

  # All-or-nothing publish: this is the ONLY job that touches GitHub Releases,
  # and it `needs` every artifact-producing build job. GitHub runs a `needs`
  # job only when all of its dependencies succeed, so a failure in ANY build
  # skips this job and no release is created -- we never ship a release that is
  # missing an artifact we're counting on. All files are uploaded in a single
  # action-gh-release call, so the release appears atomically and complete.
  publish:
    needs: [release-macos, release-linux, release-windows]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true   # flatten every artifact into dist/

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/dimmit-*.pkg
            dist/dimmit_*_amd64.deb
            dist/dimmit-*-windows-*.zip
            dist/latest.json
