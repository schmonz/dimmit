name: release

# Build the macOS universal .pkg and publish it to GitHub Releases.
#
# Phase 1: unsigned. Signing/notarization is a later, bolt-on step (see the
# deferred-phases backlog).
#
# The spike confirmed a modern-SDK x86_64 slice targeting 10.9 runs on real
# Mavericks once the post-10.9 symbol leaks are shimmed (clock_gettime,
# IORegistryEntryCopyPath). The "10.9 compat guard" step below fails the build
# if a future change reintroduces such a leak.
#
# RELEASE INVARIANT: a release must contain EVERY artifact we ship -- never a
# partial one. The build jobs only upload workflow artifacts; the single
# `publish` job is the only thing that writes to GitHub Releases, and it
# `needs` every build job, so any build failure skips publishing entirely.
# When you add a new artifact-producing job, you MUST add it to `publish`'s
# `needs:` list -- there is no "depend on all jobs" in Actions, so a forgotten
# entry silently lets a release ship without that artifact.

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # manual runs produce an artifact, not a release

# Creating the Release and uploading assets needs the GITHUB_TOKEN to have
# write access to repo contents; the default is read-only, which 403s.
permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-26       # Tahoe (SDK 26.x) -- matches the toolchain we
                            # verified GREEN on real 10.9; builds both slices
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive   # vendored ddcctl + m1ddc are git submodules

      - name: Determine version
        id: ver
        uses: ./.github/actions/determine-version

      - name: Build and test
        uses: ./.github/actions/build-macos

      - name: Build .pkg
        run: |
          sh packaging/macos/build_pkg.sh build/universal "${{ steps.ver.outputs.version }}" \
            "dimmit-${{ steps.ver.outputs.version }}.pkg"
          pkgutil --payload-files "dimmit-${{ steps.ver.outputs.version }}.pkg" | grep -E 'sbin|/bin/|LaunchAgents'

      - name: Emit machine-readable feed
        run: |
          VER="${{ steps.ver.outputs.version }}"
          cat > latest.json <<EOF
          {
            "version": "$VER",
            "min_os": "10.9",
            "pkg": "dimmit-$VER.pkg",
            "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/dimmit-$VER.pkg"
          }
          EOF
          cat latest.json

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v7
        with:
          name: dimmit-pkg
          path: |
            dimmit-*.pkg
            latest.json

  # Basic Linux .deb on plain ubuntu-latest -- a smoke test of the build+publish
  # path. The full design (per-distro container matrix + apt repo on the VPS) is
  # in docs/superpowers/plans/2026-06-11-linux-deb-distribution.md; this job
  # evolves into that. build_deb.sh ships the apt source only once the signing
  # key is committed, so for now this produces a plain .deb.
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Determine version
        id: ver
        uses: ./.github/actions/determine-version

      - name: Build and test
        uses: ./.github/actions/build-linux

      - name: Install packaging dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev build-essential

      - name: Build .deb
        run: |
          VER="${{ steps.ver.outputs.version }}"
          sh packaging/linux/build_deb.sh build "$VER" noble "dimmit_${VER}_amd64.deb"

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v7
        with:
          name: dimmit-deb
          path: dimmit_*_amd64.deb

  # Native Windows PE builds via MSYS2/MinGW-w64. Two arches:
  #   x86_64 -> UCRT64 (gcc), arm64 -> CLANGARM64 (clang; no gcc for Win/ARM64).
  # Linked `-static` so the shipped .exe depends ONLY on OS-provided DLLs
  # (dxva2, kernel32, user32, ws2_32, UCRT) -- no libwinpthread/libgcc, so it
  # runs on a stock Windows 10 1803+/11 with no MSYS2 install. The DLL-leak
  # guard below fails the build if a future change reintroduces such a dep --
  # same spirit as the macOS 10.9 compat guard above. arm64 has no x86_64 host
  # that can run it; the windows-11-arm runner is its first real validation.
  release-windows:
    name: Build (Windows ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: windows-latest
            msystem: UCRT64
            prefix: mingw-w64-ucrt-x86_64
            cc: gcc
          - arch: arm64
            runner: windows-11-arm
            msystem: CLANGARM64
            prefix: mingw-w64-clang-aarch64
            cc: clang
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Determine version
        id: ver
        uses: ./.github/actions/determine-version

      - name: Build and test
        uses: ./.github/actions/build-windows
        with:
          msystem: ${{ matrix.msystem }}
          prefix: ${{ matrix.prefix }}
          cc: ${{ matrix.cc }}

      - name: Stage binaries
        run: |
          dist="payload-${{ matrix.arch }}"
          mkdir "$dist"
          cp build/dimmitd.exe build/dimmit-up.exe build/dimmit-down.exe "$dist"/

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v7
        with:
          name: dimmit-windows-${{ matrix.arch }}
          path: payload-${{ matrix.arch }}/*.exe

  # Compile the single Windows installer from BOTH per-arch builds. Runs only
  # after release-windows (both matrix legs) succeed; it downloads their raw exe
  # artifacts, builds the Inno Setup installer that bundles both arches, and
  # smoke-tests a real silent install + uninstall on the runner.
  release-windows-installer:
    name: Build Windows installer
    needs: [release-windows]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Determine version
        id: ver
        uses: ./.github/actions/determine-version

      - name: Download x86_64 binaries
        uses: actions/download-artifact@v8
        with:
          name: dimmit-windows-x86_64
          path: payload/x64

      - name: Download arm64 binaries
        uses: actions/download-artifact@v8
        with:
          name: dimmit-windows-arm64
          path: payload/arm64

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        # Inno resolves relative Source: paths against the .iss dir, not cwd, so
        # the payload dirs must be passed as ABSOLUTE paths.
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ steps.ver.outputs.version }}" `
            "/DX64Dir=$PWD\payload\x64" "/DArm64Dir=$PWD\payload\arm64" `
            packaging\windows\dimmit.iss

      - name: Smoke test installer (install + uninstall)
        shell: pwsh
        run: |
          $setup = Get-ChildItem packaging\windows\dimmit-*-windows-setup.exe | Select-Object -First 1
          Start-Process $setup.FullName -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait
          & packaging\windows\smoke_test.ps1 -Mode post-install
          $unins = Join-Path $env:LOCALAPPDATA 'Programs\Dimmit\unins000.exe'
          Start-Process $unins -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait
          Start-Sleep -Seconds 3
          Stop-Process -Name dimmitd -Force -ErrorAction SilentlyContinue
          & packaging\windows\smoke_test.ps1 -Mode post-uninstall

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: dimmit-windows-setup
          path: packaging/windows/dimmit-*-windows-setup.exe

  # All-or-nothing publish: this is the ONLY job that touches GitHub Releases,
  # and it `needs` every artifact-producing build job. GitHub runs a `needs`
  # job only when all of its dependencies succeed, so a failure in ANY build
  # skips this job and no release is created -- we never ship a release that is
  # missing an artifact we're counting on. The Windows dependency is the
  # installer job (which itself needs release-windows), so a Windows build OR
  # installer failure still blocks the release. Artifacts are downloaded by
  # explicit name -- not merged -- so the two per-arch raw-exe artifacts (both
  # containing dimmitd.exe) can't collide in dist/. latest.json rides in the
  # dimmit-pkg artifact.
  publish:
    needs: [release-macos, release-linux, release-windows-installer]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: dimmit-pkg
          path: dist

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: dimmit-deb
          path: dist

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v8
        with:
          name: dimmit-windows-setup
          path: dist

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/dimmit-*.pkg
            dist/dimmit_*_amd64.deb
            dist/dimmit-*-windows-setup.exe
            dist/latest.json
